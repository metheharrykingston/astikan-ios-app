workflows:
  astikan-ios-build-check:
    name: Astikan iOS Build Check
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      node: 20
      xcode: latest
      vars:
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
    scripts:
      - name: Show project structure
        script: |
          pwd
          ls -la
          test -f package.json || (echo "package.json missing. Push the full Capacitor project root, not only ios/." && exit 1)
          test -d ios/App || (echo "ios/App missing." && exit 1)
          test -f capacitor.config.ts || (echo "capacitor.config.ts missing." && exit 1)
      - name: Install JS dependencies
        script: |
          npm ci --no-audit --no-fund
      - name: Build Vite web app
        script: |
          npm run build
      - name: Sync Capacitor iOS
        script: |
          npx cap sync ios
      - name: Build iOS app without signing
        script: |
          cd ios/App
          xcodebuild \
            -project App.xcodeproj \
            -scheme App \
            -configuration Debug \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            build
    artifacts:
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/Products/**/*.app
      - /tmp/xcodebuild_logs/*.log

  astikan-ios-ad-hoc-ipa:
    name: Astikan iOS Ad Hoc IPA
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      node: 20
      xcode: latest
      ios_signing:
        distribution_type: ad_hoc
        bundle_identifier: com.astikan.user
      vars:
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
    scripts:
      - name: Install JS dependencies
        script: |
          npm ci --no-audit --no-fund
      - name: Build Vite web app
        script: |
          npm run build
      - name: Sync Capacitor iOS
        script: |
          npx cap sync ios
      - name: Set up code signing settings on Xcode project
        script: |
          xcode-project use-profiles --project ios/App/App.xcodeproj
      - name: Build signed IPA
        script: |
          xcode-project build-ipa \
            --project ios/App/App.xcodeproj \
            --scheme App
    artifacts:
      - build/ios/ipa/*.ipa
      - $HOME/Library/Developer/Xcode/Archives/**/*.xcarchive
      - /tmp/xcodebuild_logs/*.log
